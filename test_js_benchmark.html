<!DOCTYPE html>
<html>
  <head>
    <title>FenBrowser JS Benchmark</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
        background: #222;
        color: #eee;
      }
      .log-entry {
        margin: 5px 0;
        padding: 5px;
        border-bottom: 1px solid #444;
      }
      .result {
        color: #8f8;
        font-weight: bold;
      }
      button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        background: #444;
        color: #fff;
        border: 1px solid #666;
        margin-right: 10px;
      }
      button:hover {
        background: #555;
      }
    </style>
  </head>
  <body>
    <h1>FenBrowser JS Benchmark</h1>
    <div>
      <button onclick="runMath()">Run Math Test</button>
      <button onclick="runDom()">Run DOM Test</button>
      <button onclick="runAll()">Run All</button>
    </div>
    <div id="status" style="margin-top: 20px; font-style: italic">Ready</div>
    <div
      id="results"
      style="
        margin-top: 20px;
        border: 1px solid #666;
        padding: 10px;
        min-height: 200px;
      "
    ></div>

    <script>
      function log(msg, className) {
        console.log(msg);
        var r = document.getElementById("results");
        var div = document.createElement("div");
        div.className = "log-entry " + (className || "");
        div.innerText = msg;
        r.appendChild(div);
        // Auto scroll to bottom
        r.scrollTop = r.scrollHeight;
        var s = document.getElementById("status");
        s.innerText = msg;
      }

      function runMath() {
        log("Running Math Benchmark (Integer Addition)...");
        // Use setTimeout to allow UI render update
        setTimeout(function () {
          var start = Date.now();
          var count = 0;
          var limit = 200000; // 200k iterations
          while (count < limit) {
            var x = 1 + 1;
            var y = x * 2;
            var z = y / 2;
            count = count + 1;
          }
          var end = Date.now();
          var dur = end - start;
          if (dur === 0) dur = 1; // avoid divide by zero
          var ops = (limit / dur) * 1000;
          log(
            "Math Result: " +
              count +
              " ops in " +
              dur +
              "ms (" +
              Math.floor(ops) +
              " ops/s)",
            "result"
          );
        }, 50);
      }

      function runDom() {
        log("Running DOM Benchmark (Create/Append/Remove)...");
        setTimeout(function () {
          var start = Date.now();
          var count = 0;
          var limit = 5000; // 5k iterations
          var container = document.createElement("div");
          document.body.appendChild(container);

          while (count < limit) {
            var div = document.createElement("div");
            div.innerText = "Item " + count;
            container.appendChild(div);
            container.removeChild(div);
            count = count + 1;
          }

          document.body.removeChild(container);
          var end = Date.now();
          var dur = end - start;
          if (dur === 0) dur = 1;
          var ops = (limit / dur) * 1000;
          log(
            "DOM Result: " +
              count +
              " ops in " +
              dur +
              "ms (" +
              Math.floor(ops) +
              " ops/s)",
            "result"
          );
        }, 50);
      }

      function runAll() {
        log("Starting Full Suite...");
        runMath();
        setTimeout(runDom, 1000);
      }
    </script>
  </body>
</html>
