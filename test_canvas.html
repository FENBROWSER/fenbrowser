<!DOCTYPE html>
<html>
<body>
    <h1>Canvas Test (SkiaSharp)</h1>
    <p>Below should be a 400x200 canvas with:</p>
    <ul>
        <li>A red rectangle (20,20 to 170,120)</li>
        <li>A blue line (vertical at x=200)</li>
        <li>A cleared rectangle (hole) at 40,40</li>
    </ul>
    <canvas id="myCanvas" width="400" height="200" style="border:1px solid #000000; background-color: #f0f0f0;"></canvas>
    <button onclick="runTest()">Draw Now</button>
    <script>
        function log(msg) {
            var p = document.createElement("p");
            p.textContent = msg;
            document.body.appendChild(p);
            console.log(msg);
        }

        function runTest() {
            // alert("Starting test..."); // Uncomment if needed, but let's try logging first
            try {
                var c = document.getElementById("myCanvas");
                var ctx = c.getContext("2d");
                
                log("Canvas element: " + c);
                log("Context object: " + ctx);

                if (ctx) {
                    var keys = [];
                    for (var k in ctx) keys.push(k);
                    log("Context keys: " + keys.join(", "));
                }
                
                if (!ctx) {
                    var p = document.createElement("p");
                    p.style.color = "red";
                    p.textContent = "FAILED: getContext('2d') returned null";
                    document.body.appendChild(p);
                } else {
                    log("Context obtained. Setting fillStyle...");
                    // Red rectangle
                    ctx.fillStyle = "#FF0000";
                    log("fillStyle set. Calling fillRect...");
                    ctx.fillRect(20, 20, 150, 100);
                    log("fillRect called. Beginning path...");
                    
                    // Blue line
                    ctx.beginPath();
                    log("beginPath called. Moving to...");
                    ctx.moveTo(200, 20);
                    log("moveTo called. Line to...");
                    ctx.lineTo(200, 100);
                    log("lineTo called. Setting strokeStyle...");
                    ctx.strokeStyle = "#0000FF";
                    log("strokeStyle set. Setting lineWidth...");
                    ctx.lineWidth = 5;
                    log("lineWidth set. Stroking...");
                    ctx.stroke();
                    log("stroke called. Clearing rect...");
                    
                    // Clear rect test
                    ctx.clearRect(40, 40, 50, 50);
                    
                    var p = document.createElement("p");
                    p.style.color = "green";
                    p.textContent = "Script executed without error.";
                    document.body.appendChild(p);
                }
            } catch (e) {
                var msg = "Error: " + e;
                if (e.message) msg += " | Message: " + e.message;
                try { msg += " | JSON: " + JSON.stringify(e); } catch (ex) {}
                var p = document.createElement("p");
                p.style.color = "red";
                p.textContent = msg;
                document.body.appendChild(p);
                console.error(e);
            }
        }
        
        // Run after a short delay to ensure rendering is complete
        setTimeout(runTest, 1000);
    </script>
</body>
</html>
