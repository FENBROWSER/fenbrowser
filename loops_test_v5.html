<!DOCTYPE html>
<html>
<body>
    <script>
        var mylog = function(msg) {
            console.log(msg);
        };

        mylog("Test 1 New Operator");
        var MyClass = function() {
            this.x = 10;
        };
        
        var obj = new MyClass();
        if (obj) {
            mylog("PASS new MyClass returned an object value");
        } else {
            mylog("FAIL new MyClass returned null undefined");
        }

        mylog("Test 2 Comma Operator");
        var x = (1, 2);
        if (x == 2) {
            mylog("PASS 1 2 evaluated to 2");
        } else {
            mylog("FAIL 1 2 evaluated to " + x);
        }

        mylog("Test 3 While Loop");
        var i = 0;
        while (i < 3) {
            mylog("While loop iteration " + i);
            i = i + 1;
        }
        if (i == 3) {
            mylog("PASS While loop finished correctly");
        } else {
            mylog("FAIL While loop finished with i " + i);
        }

        mylog("Test 4 For Loop");
        var j = 0;
        for (var k = 0; k < 3; k = k + 1) {
            mylog("For loop iteration " + k);
            j = k + 1;
        }
        if (j == 3) {
            mylog("PASS For loop finished correctly");
        } else {
            mylog("FAIL For loop finished with j " + j);
        }

        mylog("Test 5 Null and Undefined");
        var n = null;
        var u = undefined;
        if (n == null) {
            mylog("PASS null is null");
        } else {
            mylog("FAIL null check failed");
        }
        if (u == undefined) {
            mylog("PASS undefined is undefined");
        } else {
            mylog("FAIL undefined check failed");
        }

        console.log("Tests Completed");
    </script>
</body>
</html>
