name: FenBrowser CI

on:
  pull_request:
    branches:
      - main
      - rewrite-history
    paths-ignore:
      - "docs/**"
      - "Results/**"
      - "logs/**"
      - "**/*.md"
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "Results/**"
      - "logs/**"
      - "**/*.md"
  workflow_dispatch:
    inputs:
      run_full_regression:
        description: "Run full FenBrowser.Tests regression suite"
        required: false
        default: false
        type: boolean
      publish_windows_artifact:
        description: "Publish self-contained FenBrowser.Host win-x64 artifact"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  quality-gate:
    name: Quality Gate (blocking)
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET SDK from global.json
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true

      - name: Validate spec governance headers
        shell: pwsh
        run: ./scripts/validate_spec_headers.ps1

      - name: Check placeholder assertions
        shell: pwsh
        run: |
          $matches = Get-ChildItem FenBrowser.Tests -Recurse -File -Include *.cs |
            Select-String -Pattern 'Assert\.True\(true\)|Assert\.False\(false\)' -CaseSensitive
          if ($matches) {
            $lines = $matches | ForEach-Object { "$($_.Path):$($_.LineNumber): $($_.Line.Trim())" }
            Write-Error ("Placeholder assertions found:`n" + ($lines -join "`n"))
            exit 1
          }

      - name: Build WebIdlGen prerequisite
        run: dotnet build FenBrowser.WebIdlGen/FenBrowser.WebIdlGen.csproj -c Release --nologo

      - name: Build test surface
        run: dotnet build FenBrowser.Tests/FenBrowser.Tests.csproj -c Release --nologo

      - name: Run P0 hardening gates
        shell: pwsh
        run: |
          $project = "FenBrowser.Tests/FenBrowser.Tests.csproj"
          $config = "Release"
          $filters = @(
            "FullyQualifiedName~FenBrowser.Tests.Engine.EventLoopTests",
            "FullyQualifiedName~FenBrowser.Tests.Engine.EventLoopPriorityTests",
            "FullyQualifiedName~FenBrowser.Tests.Rendering.RenderPipelineInvariantTests",
            "FullyQualifiedName~FenBrowser.Tests.Rendering.DamageRegionNormalizationPolicyTests",
            "FullyQualifiedName~FenBrowser.Tests.Core.Network.CspPolicyTests",
            "FullyQualifiedName~FenBrowser.Tests.Core.SecurityChecksTests",
            "FullyQualifiedName~FenBrowser.Tests.Core.ResourceManagerCorsSendAsyncTests",
            "FullyQualifiedName~FenBrowser.Tests.Architecture.IpcEnvelopeValidationTests"
          )

          foreach ($filter in $filters) {
            dotnet test $project -c $config --no-build --filter $filter --verbosity minimal
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

  full-regression:
    name: Full Regression (nightly or manual)
    needs: quality-gate
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_full_regression) }}
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET SDK from global.json
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true

      - name: Build test surface
        run: dotnet build FenBrowser.Tests/FenBrowser.Tests.csproj -c Release --nologo

      - name: Run full unit test suite
        run: dotnet test FenBrowser.Tests/FenBrowser.Tests.csproj -c Release --no-build --logger trx --results-directory TestResults --verbosity normal

      - name: Run verification guard audit (advisory)
        continue-on-error: true
        shell: pwsh
        run: ./scripts/ci/verify-verification-guards.ps1

      - name: Upload full regression test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-regression-test-results
          path: TestResults/
          if-no-files-found: ignore

  package-windows:
    name: Publish Windows Artifact (tag or manual)
    needs: quality-gate
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_windows_artifact) }}
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET SDK from global.json
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true

      - name: Build WebIdlGen prerequisite
        run: dotnet build FenBrowser.WebIdlGen/FenBrowser.WebIdlGen.csproj -c Release --nologo

      - name: Restore FenBrowser.Host (win-x64)
        run: dotnet restore FenBrowser.Host/FenBrowser.Host.csproj -r win-x64 --nologo

      - name: Publish FenBrowser.Host (Release win-x64)
        run: >
          dotnet publish FenBrowser.Host/FenBrowser.Host.csproj
          --no-restore
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:IncludeAllContentForSelfExtract=true
          -o artifacts/fenbrowser-win-x64

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: fenbrowser-win-x64
          path: artifacts/fenbrowser-win-x64
          if-no-files-found: error
