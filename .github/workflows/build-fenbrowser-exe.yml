name: Build FenBrowser EXE

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET SDK from global.json
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Verification Guards
        shell: pwsh
        run: ./scripts/ci/verify-verification-guards.ps1

      - name: Spec Governance Validation
        shell: pwsh
        run: ./scripts/validate_spec_headers.ps1

      - name: Build WebIdlGen prerequisite
        run: dotnet build FenBrowser.WebIdlGen/FenBrowser.WebIdlGen.csproj -c Release

      - name: Restore FenBrowser.Host (win-x64)
        run: dotnet restore FenBrowser.Host/FenBrowser.Host.csproj -r win-x64

      - name: Publish FenBrowser.Host (Release win-x64)
        run: >
          dotnet publish FenBrowser.Host/FenBrowser.Host.csproj
          --no-restore
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:IncludeAllContentForSelfExtract=true
          -o artifacts/fenbrowser-win-x64

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: fenbrowser-win-x64
          path: artifacts/fenbrowser-win-x64
          if-no-files-found: error

  unit-tests:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET SDK from global.json
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Spec Governance Validation
        shell: pwsh
        run: ./scripts/validate_spec_headers.ps1

      - name: Build WebIdlGen prerequisite
        run: dotnet build FenBrowser.WebIdlGen/FenBrowser.WebIdlGen.csproj -c Release

      - name: Build Tests project
        run: dotnet build FenBrowser.Tests/FenBrowser.Tests.csproj -c Release

      - name: Run unit tests
        run: dotnet test FenBrowser.Tests/FenBrowser.Tests.csproj -c Release --logger trx --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/
          if-no-files-found: ignore

  test262-regression:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET SDK from global.json
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Spec Governance Validation
        shell: pwsh
        run: ./scripts/validate_spec_headers.ps1

      - name: Build WebIdlGen prerequisite
        run: dotnet build FenBrowser.WebIdlGen/FenBrowser.WebIdlGen.csproj -c Release

      - name: Provision Test262 suite
        shell: pwsh
        run: |
          if (-not (Test-Path .\test262\harness)) {
            git clone --depth 1 https://github.com/tc39/test262.git test262
          }

      - name: Build Test262 runner
        run: dotnet build FenBrowser.Test262/FenBrowser.Test262.csproj -c Release

      - name: Run Test262 CI regression subset
        shell: pwsh
        run: '& .\scripts\ci\run-test262-ci.ps1'

      - name: Upload Test262 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test262-results
          path: test262-ci-results.json
          if-no-files-found: ignore
