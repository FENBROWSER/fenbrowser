<!DOCTYPE html>
<html>
<head>
    <title>Visibility Test</title>
    <style>
        .hidden-box {
            visibility: hidden;
            width: 100px;
            height: 100px;
            background: red;
        }
        .visible-box {
            visibility: visible;
            width: 100px;
            height: 100px;
            background: green;
        }
    </style>
</head>
<body>
    <div class="hidden-box">This should be hidden</div>
    <div class="visible-box">This should be visible</div>
</body>
</html>
